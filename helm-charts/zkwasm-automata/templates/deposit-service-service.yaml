{{- if .Values.depositService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zkwasm-automata.fullname" . }}-deposit
  labels:
    {{- include "zkwasm-automata.labels" . | nindent 4 }}
    app.kubernetes.io/component: deposit-service
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "zkwasm-automata.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: deposit-service
{{- end }}
